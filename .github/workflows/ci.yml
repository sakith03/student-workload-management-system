name: CI Pipeline

on:
  push:
    branches: [test]
  pull_request:
    branches: [test]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout Code
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2️⃣ Build Docker Images
      - name: Build Docker Images
        run: docker compose build

      # 3️⃣ Create .env file
      - name: Create .env file
        run: |
          echo "MYSQL_ROOT_PASSWORD=${{ secrets.MYSQL_ROOT_PASSWORD }}" >> .env
          echo "MYSQL_PASSWORD=${{ secrets.MYSQL_PASSWORD }}" >> .env
          echo "MYSQL_USER=${{ secrets.MYSQL_USER }}" >> .env
          echo "MYSQL_DATABASE=${{ secrets.MYSQL_DATABASE }}" >> .env
          echo "JWT_SECRET=${{ secrets.JWT_SECRET }}" >> .env  

      # 4️⃣ Start Services
      - name: Start Services
        run: docker compose up -d

      # 5️⃣ Wait for services
      - name: Wait for services
        run: sleep 15

      # 6️⃣ Basic health check
      - name: Health Check
        run: curl --fail http://localhost:3000/health || exit 1

      # 7️⃣ Run tests (optional)
      # - name: Run Tests
      #   run: docker compose exec backend npm test

      # 8️⃣ Tear down
      - name: Stop Services
        run: docker compose down

  push-image:
    runs-on: ubuntu-latest
    needs: build-and-test               # ← Only runs if build-and-test passes
    if: github.ref == 'refs/heads/test' # ← Only on test branch

    steps:
      # 1️⃣ Checkout repository
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2️⃣ Login to Docker Hub securely
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 3️⃣ Build & push backend image
      - name: Build & Push Backend Image
        run: |
           docker build \
              -f ./backend/src/StudentWorkload.API/Dockerfile \
              -t ${{ secrets.DOCKER_USERNAME }}/myapp-backend:latest \
              -t ${{ secrets.DOCKER_USERNAME }}/myapp-backend:${{ github.sha }} \
              ./backend
            docker push ${{ secrets.DOCKER_USERNAME }}/myapp-backend:latest
            docker push ${{ secrets.DOCKER_USERNAME }}/myapp-backend:${{ github.sha }}

      # 4️⃣ Build & push frontend image
      - name: Build & Push Frontend Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/myapp-frontend:latest \
                       -t ${{ secrets.DOCKER_USERNAME }}/myapp-frontend:${{ github.sha }} ./frontend
          docker push ${{ secrets.DOCKER_USERNAME }}/myapp-frontend:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/myapp-frontend:${{ github.sha }}
