name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read
  checks: write      # Allow writing check runs for test results
  pull-requests: write

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Setup .NET
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'



      # 3. Setup Node
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      # 4. Install Frontend Dependencies
      - name: Install Frontend Dependencies
        run: npm install
        working-directory: ./frontend

      # 5. Create .env file
      - name: Create .env file
        run: |
          echo "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" >> .env
          echo "JWT_SECRET=${{ secrets.JWT_SECRET }}" >> .env

      # 6. Build Docker Images
      - name: Build Docker Images
        run: docker compose build

      # 7. Start Services
      - name: Start Services
        run: docker compose up -d

      # 8. Wait for Backend Health
      - name: Wait for Backend
        run: |
          for i in {1..10}; do
            curl -f http://localhost:5000/health && break
            sleep 5
          done

      # 9. Stop Services
      - name: Stop Services
        run: docker compose down

    
      # 10 Run Backend Tests with TRX Logger
      - name: Run Backend Tests
        run: dotnet test ./backend --logger "trx;LogFileName=test_results.trx"

      # 11 Publish Test Results
      - name: Publish Test Summary
        uses: dorny/test-reporter@v1
        if: always() # Ensure this runs even if tests fail
        with:
          name:  Backend Unit Tests Report
          path: "**/*test_results.trx"
          reporter: dotnet-trx