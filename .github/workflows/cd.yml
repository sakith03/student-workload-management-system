name: CD Pipeline

on:
  push:
    branches: [main, develop]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Setup Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 3. Login to Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 4. Build & Push Backend
      - name: Build & Push Backend
        run: |
          docker build \
            -f ./backend/src/StudentWorkload.API/Dockerfile \
            -t ${{ secrets.DOCKER_USERNAME }}/myapp-backend:latest \
            -t ${{ secrets.DOCKER_USERNAME }}/myapp-backend:${{ github.sha }} \
            ./backend
          docker push ${{ secrets.DOCKER_USERNAME }}/myapp-backend:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/myapp-backend:${{ github.sha }}

      # 5. Build & Push Frontend
      - name: Build & Push Frontend
        run: |
          docker build \
            --build-arg VITE_API_URL=${{ secrets.VITE_API_URL }} \
            -t ${{ secrets.DOCKER_USERNAME }}/myapp-frontend:latest \
            -t ${{ secrets.DOCKER_USERNAME }}/myapp-frontend:${{ github.sha }} \
            ./frontend
          docker push ${{ secrets.DOCKER_USERNAME }}/myapp-frontend:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/myapp-frontend:${{ github.sha }}

      # 6. Deploy Backend
      - name: Deploy Backend
        uses: azure/webapps-deploy@v2
        with:
          app-name: backend-loadmate
          publish-profile: ${{ secrets.AZURE_PUBLISH_PROFILE_BACKEND }}
          images: ${{ secrets.DOCKER_USERNAME }}/myapp-backend:${{ github.sha }}

      # 7. Deploy Frontend
      - name: Deploy Frontend
        uses: azure/webapps-deploy@v2
        with:
          app-name: frontend-loadmate
          publish-profile: ${{ secrets.AZURE_PUBLISH_PROFILE_FRONTEND }}
          images: ${{ secrets.DOCKER_USERNAME }}/myapp-frontend:${{ github.sha }} 

      # 8. Print Deployment Report 
      - name: Print Detailed Deployment Report
        if: always()
        run: |
          echo "## LoadMate Deployment Summary" >> $GITHUB_STEP_SUMMARY
          
          # Git & Commit Details
          echo "### Trigger Information" >> $GITHUB_STEP_SUMMARY
          echo "* **Pushed by:** @${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "* **Branch:** \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "* **Commit Message:** ${{ github.event.head_commit.message }}" >> $GITHUB_STEP_SUMMARY
          echo "* **Full Logs:** [Click here to view all logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # Deployment Status
          echo "### Deployment Status" >> $GITHUB_STEP_SUMMARY
          if [ "${{ job.status }}" == "success" ]; then
            echo " **SUCCESS:** All services deployed correctly." >> $GITHUB_STEP_SUMMARY
            echo "* **Backend:** [backend-loadmate.azurewebsites.net](https://backend-loadmate.azurewebsites.net/health)" >> $GITHUB_STEP_SUMMARY
            echo "* **Frontend:** [frontend-loadmate.azurewebsites.net](https://frontend-loadmate-h5h2gghtascvcnay.centralindia-01.azurewebsites.net/login)" >> $GITHUB_STEP_SUMMARY
            echo "* **Docker Tag:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
            echo "* **Deployed At:** $(date -u +'%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Performance Audit" >> $GITHUB_STEP_SUMMARY
            echo "Google Lighthouse report has been generated! Scroll to the bottom of this page and look under **Artifacts** to download the full HTML report." >> $GITHUB_STEP_SUMMARY
          else
            echo " **FAILED:** Deployment did not complete. Check the full logs above." >> $GITHUB_STEP_SUMMARY
          fi

      # ── Step 1: Slack Notifications ───────────────────────────────────────

      - name: 📣 Notify Slack — Deployment Success
        if: success()
        run: |
          curl -X POST "${{ secrets.SLACK_WEBHOOK_URL }}" \
            -H 'Content-type: application/json' \
            --data '{
              "text": "✅ *LoadMate Deployed Successfully!*",
              "attachments": [{
                "color": "#36a64f",
                "fields": [
                  {"title": "Branch",        "value": "${{ github.ref_name }}", "short": true},
                  {"title": "Deployed by",   "value": "${{ github.actor }}",    "short": true},
                  {"title": "Commit SHA",    "value": "${{ github.sha }}",      "short": false},
                  {"title": "Frontend",      "value": "https://frontend-loadmate-h5h2gghtascvcnay.centralindia-01.azurewebsites.net/login", "short": true},
                  {"title": "Backend Health","value": "https://backend-loadmate.azurewebsites.net/health", "short": true}
                ]
              }]
            }'

      - name: 🚨 Notify Slack — Deployment Failed
        if: failure()
        run: |
          curl -X POST "${{ secrets.SLACK_WEBHOOK_URL }}" \
            -H 'Content-type: application/json' \
            --data '{
              "text": "❌ *LoadMate Deployment FAILED!*",
              "attachments": [{
                "color": "#d9534f",
                "fields": [
                  {"title": "Branch",       "value": "${{ github.ref_name }}", "short": true},
                  {"title": "Triggered by", "value": "${{ github.actor }}",    "short": true},
                  {"title": "Commit",       "value": "${{ github.sha }}",      "short": false},
                  {"title": "View Pipeline","value": "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}", "short": false}
                ]
              }]
            }'