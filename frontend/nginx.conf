server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;
 
    # SPA fallback — all routes serve index.html (React Router handles routing)
    location / {
        try_files $uri $uri/ /index.html;
    }
 
    # API calls are made directly from React (axios/fetch)
    # No proxying needed - frontend calls backend URL directly
 
    # Cache static assets
    location ~* \.(js|css|png|jpg|ico|svg)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
